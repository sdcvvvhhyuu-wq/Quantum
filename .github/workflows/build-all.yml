name: ArgoTunnel Ultimate CI/CD

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.0
      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.0-bin.zip
          unzip -q gradle-8.0-bin.zip
          echo "$PWD/gradle-8.0/bin" >> $GITHUB_PATH
      - name: Generate Gradle Wrapper
        run: |
          cd android
          gradle wrapper --gradle-version 8.0
          chmod +x gradlew
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/*.apk

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Build Windows binary
        run: |
          cd windows
          go build -ldflags="-H windowsgui" -o ArgoTunnel.exe
      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: windows/ArgoTunnel.exe

  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64, arm]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Build Linux binary
        run: |
          cd linux
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} go build -o ArgoTunnel-linux-${{ matrix.goarch }}
      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.goarch }}
          path: linux/ArgoTunnel-linux-${{ matrix.goarch }}

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: cd ios && xcodegen generate
      - name: Build iOS App
        run: |
          cd ios
          xcodebuild clean build -project ArgoTunnel.xcodeproj -scheme ArgoTunnel -configuration Release -destination 'generic/platform=iOS' CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO
          mkdir Payload
          cp -r build/Release-iphoneos/ArgoTunnel.app Payload/
          zip -r ArgoTunnel.ipa Payload
      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ios/ArgoTunnel.ipa

  openwrt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare OpenWrt Package
        run: |
          cd openwrt
          mkdir -p package/argotunnel
          cp Makefile package/argotunnel/
          echo "OpenWrt package prepared"
      - uses: actions/upload-artifact@v4
        with:
          name: openwrt-ipk
          path: openwrt/package/argotunnel

  scanner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - run: cd scanner-cli && go build -o argoscan
      - uses: actions/upload-artifact@v4
        with:
          name: scanner-cli
          path: scanner-cli/argoscan

  release:
    needs: [android, windows, linux, ios, openwrt, scanner]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/android-apk/*.apk
            ./artifacts/windows-exe/*.exe
            ./artifacts/linux-amd64/*
            ./artifacts/linux-arm64/*
            ./artifacts/linux-arm/*
            ./artifacts/ios-ipa/*.ipa
            ./artifacts/openwrt-ipk/*
            ./artifacts/scanner-cli/argoscan
